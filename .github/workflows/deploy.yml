name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_GITHUB_URL: ${{ secrets.VITE_GITHUB_URL }}
          VITE_LINKEDIN_URL: ${{ secrets.VITE_LINKEDIN_URL }}
          VITE_EMAIL: ${{ secrets.VITE_EMAIL }}
          VITE_GITHUB_PROJECT1_URL: ${{ secrets.VITE_GITHUB_PROJECT1_URL }}
          VITE_GITHUB_PROJECT2_URL: ${{ secrets.VITE_GITHUB_PROJECT2_URL }}
          VITE_GITHUB_PROJECT3_URL: ${{ secrets.VITE_GITHUB_PROJECT3_URL }}
          VITE_GITHUB_PROJECT4_URL: ${{ secrets.VITE_GITHUB_PROJECT4_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
